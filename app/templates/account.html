{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Account</title>
    <link rel="stylesheet" href="{% static 'app/css/account.css' %}">
    <link rel="stylesheet" href="{% static 'app/css/sidebar.css' %}">
    <link rel="icon" href="{% static 'app/images/favicon.ico' %}" type="image/x-icon">
</head>
<body>
    {% block sidebar %}
    {% include 'sidebar.html' %}
    {% endblock %}
    <div class="account-container">
        <div class="form-group">
            <label>Email</label>
            <div class="email-box">{{ email }}</div>
        </div>
        <div class="form-group">
            <div class="radio-group">
                <input type="radio" id="option1" name="options" value="fsrs"
                    {% if fsrs %}checked{% endif %}>
                <label for="option1">FSRS (recommended)</label>
                <input type="radio" id="option2" name="options" value="nn"
                    {% if not fsrs %}checked{% endif %}>
                <label for="option2">Neural Network</label>
            </div>
        </div>
        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" id="notifications">
                <label for="notifications">Enable Notifications</label>
            </div>
        </div>
        <div class="form-group retention-group">
            <label for="retention-rate">Retention Rate (Default 90%)</label>
            <input type="number" id="retention-rate" min="70" max="99" value="{{ retention_rate }}">
        </div>        
        <button class="save-btn" id="save-btn">Save Changes</button>
        <button class="redirect-btn" id="redirect-btn-vocab">Manage Vocab</button>
        <button class="redirect-btn" id="redirect-btn-history">Watch Queue History</button>
    </div>
    <script src="{% static 'app/js/account.js' %}"></script>
</body>
</html>
