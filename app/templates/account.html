{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Account</title>
    <link rel="stylesheet" href="{% static 'app/css/account.css' %}">
    <link rel="stylesheet" href="{% static 'app/css/sidebar.css' %}">
    <link rel="icon" href="{% static 'app/images/favicon.ico' %}" type="image/x-icon">
</head>
<body>
    {% block sidebar %}
    {% include 'sidebar.html' %}
    {% endblock %}
    <div class="container">
        <h2>Next Most Common Words</h2>
        <div class="slider-container">
            <input type="range" min=0 max=1000 value=0 class="slider" id="sliderValue">
            <p class="count" id="count">0</p>
        </div>
        <button class="button" id="add">Add to Account</button>
    </div>
    <script>
        var commonWords = "{% url 'add_common_words' %}";
    </script>
    <script src="{% static 'app/js/account.js' %}"></script>
</body>
</html>
